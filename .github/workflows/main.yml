name: Build & Release APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant permission
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Rename APK
      run: |
        mkdir release
        cp app/build/outputs/apk/debug/app-debug.apk release/instabiotch.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0
        name: Insta-Biotch Release
        files: release/instabiotch.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
