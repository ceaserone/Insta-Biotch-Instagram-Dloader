name: Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/instabiotch.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Insta-Biotch Release v1.0.${{ github.run_number }}
          files: release/instabiotch.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
